services:
  web:
    container_name: my_container_name
    restart: always
    build: .
    image: my-image-name
    ports:
      - "${DJANGO_PORT}:8000"
    environment:
      - TINI_SUBREAPER=1
      - DJANGO_HOST=${DJANGO_HOST}
      - DJANGO_PORT=8000
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
    command: ["sh", "-c", "python3 manage.py runserver $DJANGO_HOST:$DJANGO_PORT"]
    volumes:
      - .:/app
    init: true
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: my_db_name
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

volumes:
  pgdata:
